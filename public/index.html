<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AddisTransit Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .header { background: #1e293b; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 20px; color: #10b981; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 24px; }
    .stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    .stat-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value { font-size: 36px; font-weight: 700; margin-top: 8px; }
    .stat-card .sub { font-size: 12px; color: #64748b; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 0 24px 24px; }
    .panel { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    .panel h2 { font-size: 16px; margin-bottom: 16px; color: #f1f5f9; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { text-align: left; padding: 10px 12px; font-size: 11px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #334155; }
    .table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #1e293b; }
    .table tr:hover { background: #334155; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #064e3b; color: #34d399; }
    .badge-blue { background: #1e3a5f; color: #60a5fa; }
    .badge-amber { background: #78350f; color: #fbbf24; }
    #map { height: 400px; border-radius: 8px; }
    .full-width { grid-column: 1 / -1; }
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .route-color { width: 12px; height: 12px; border-radius: 3px; display: inline-block; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚌 AddisTransit Admin Dashboard</h1>
    <div style="font-size: 12px; color: #64748b;" id="lastUpdate">Loading...</div>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card"><div class="label">Routes</div><div class="value" id="routesCount">-</div><div class="sub">Active routes</div></div>
    <div class="stat-card"><div class="label">Stops</div><div class="value" id="stopsCount">-</div><div class="sub">Bus stops</div></div>
    <div class="stat-card"><div class="label">Trips</div><div class="value" id="tripsCount">-</div><div class="sub">Scheduled trips</div></div>
    <div class="stat-card"><div class="label">Agencies</div><div class="value" id="agenciesCount">-</div><div class="sub">Transit agencies</div></div>
  </div>

  <div class="grid">
    <div class="panel full-width">
      <h2>🗺️ Commuter Heatmap - Stop Locations</h2>
      <div id="map"></div>
    </div>

    <div class="panel">
      <h2>🚌 Routes</h2>
      <div id="routesTable" class="loading">Loading...</div>
    </div>

    <div class="panel">
      <h2>📍 Stops</h2>
      <div id="stopsTable" class="loading">Loading...</div>
    </div>

    <div class="panel">
      <h2>🏢 Agencies</h2>
      <div id="agenciesTable" class="loading">Loading...</div>
    </div>

    <div class="panel">
      <h2>📊 Route Distribution</h2>
      <canvas id="routeChart"></canvas>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000/api';

    async function loadDashboard() {
      try {
        const res = await fetch(`${API}/v1/admin/dashboard-stats`);
        const data = await res.json();
        
        document.getElementById('routesCount').textContent = data.stats.routes;
        document.getElementById('stopsCount').textContent = data.stats.stops;
        document.getElementById('tripsCount').textContent = data.stats.trips;
        document.getElementById('agenciesCount').textContent = data.agencies?.length || 0;
        document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();

        renderRoutes(data.routes || []);
        renderStops(data.stops || []);
        renderAgencies(data.agencies || []);
        renderMap(data.stops || [], data.routes || []);
        renderChart(data.routes || []);
      } catch (e) {
        console.error('Dashboard error:', e);
        document.getElementById('stats').innerHTML = '<div class="panel"><p style="color:#ef4444">Cannot connect to backend. Make sure it is running on port 3000.</p></div>';
      }
    }

    function renderRoutes(routes) {
      const html = `<table class="table"><tr><th>Color</th><th>Name</th><th>Full Name</th></tr>` +
        routes.slice(0, 15).map(r => `<tr>
          <td><span class="route-color" style="background:#${r.route_color || 'E53935'}"></span></td>
          <td>${r.route_short_name || r.route_id.slice(-3)}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.route_long_name || '-'}</td>
        </tr>`).join('') + `</table>`;
      document.getElementById('routesTable').innerHTML = html;
    }

    function renderStops(stops) {
      const html = `<table class="table"><tr><th>Name</th><th>Lat</th><th>Lon</th></tr>` +
        stops.slice(0, 15).map(s => `<tr>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.stop_name}</td>
          <td>${s.stop_lat}</td>
          <td>${s.stop_lon}</td>
        </tr>`).join('') + `</table>`;
      document.getElementById('stopsTable').innerHTML = html;
    }

    function renderAgencies(agencies) {
      const html = `<table class="table"><tr><th>Name</th><th>ID</th></tr>` +
        agencies.map(a => `<tr>
          <td>${a.agency_name}</td>
          <td><span class="badge badge-blue">${a.agency_id}</span></td>
        </tr>`).join('') + `</table>`;
      document.getElementById('agenciesTable').innerHTML = html;
    }

    function renderMap(stops, routes) {
      const map = L.map('map').setView([9.025, 38.746], 12);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

      // Draw route shapes
      routes.slice(0, 10).forEach(async (r) => {
        try {
          const res = await fetch(`${API}/public/routes/${r.route_id}/shape`);
          const shape = await res.json();
          if (shape.shapes?.length) {
            const pts = shape.shapes.map(s => [s.lat, s.lon]);
            L.polyline(pts, { color: '#' + (shape.route_color || 'E53935'), weight: 3, opacity: 0.7 }).addTo(map);
          }
        } catch {}
      });

      // Draw stops with heatmap colors
      stops.forEach(s => {
        L.circleMarker([parseFloat(s.stop_lat), parseFloat(s.stop_lon)], {
          radius: 5, fillColor: '#10b981', color: '#fff', weight: 1, fillOpacity: 0.7
        }).addTo(map).bindTooltip(s.stop_name);
      });
    }

    function renderChart(routes) {
      const colors = routes.slice(0, 10).map(r => '#' + (r.route_color || 'E53935'));
      const labels = routes.slice(0, 10).map(r => r.route_short_name || r.route_id.slice(-3));
      new Chart(document.getElementById('routeChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: 'Routes', data: labels.map(() => 1), backgroundColor: colors }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } } }
        }
      });
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
